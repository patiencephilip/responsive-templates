<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <!-- config.js must load first so PORTFOLIO is available -->
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0b;
      --bg2:         #111113;
      --bg3:         #18181c;
      --surface:     #1e1e24;
      --border:      rgba(255,255,255,0.07);
      --border2:     rgba(255,255,255,0.13);
      --text:        #e8e6e0;
      --muted:       #6b6a72;
      --accent:      #c8a96e;
      --accent2:     #8b7355;
      --accent-glow: rgba(200,169,110,0.15);
      --font-serif:  'Cormorant Garamond', Georgia, serif;
      --font-sans:   'Syne', sans-serif;
      --font-mono:   'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-serif);
      font-size: 18px;
      line-height: 1.7;
      overflow-x: hidden;
      cursor: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      opacity: 0.5;
    }
    body:has(a:hover) .cursor { width: 12px; height: 12px; }
    body:has(a:hover) .cursor-ring { width: 48px; height: 48px; opacity: 0.8; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 28px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, background 0.3s;
    }
    nav.scrolled { border-color: var(--border); background: rgba(10,10,11,0.85); }

    .nav-logo {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after { width: 100%; }

    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 60px 80px;
      position: relative;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 30%, rgba(200,169,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(139,115,85,0.04) 0%, transparent 50%);
    }
    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .hero-eyebrow::before {
      content: '';
      display: inline-block;
      width: 40px; height: 1px;
      background: var(--accent2);
    }
    .hero-name {
      font-family: var(--font-sans);
      font-size: clamp(56px, 10vw, 120px);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .hero-name span {
      display: block;
      color: var(--accent);
      font-weight: 400;
      font-style: italic;
      font-family: var(--font-serif);
      font-size: 0.52em;
      letter-spacing: 0.02em;
      margin-top: 8px;
    }
    .hero-desc {
      max-width: 500px;
      font-size: 17px;
      color: var(--muted);
      line-height: 1.8;
      margin: 36px 0 48px;
      font-weight: 300;
    }
    .hero-cta { display: flex; gap: 20px; align-items: center; }

    .btn-primary {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      padding: 14px 32px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-primary:hover { background: var(--text); transform: translateY(-1px); }

    .btn-ghost {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }
    .btn-ghost:hover { color: var(--text); }
    .btn-ghost::after { content: '↓'; }

    .hero-scroll-line {
      position: absolute;
      right: 60px; bottom: 0;
      width: 1px; height: 120px;
      background: linear-gradient(to bottom, transparent, var(--accent2));
    }
    .hero-counter {
      position: absolute;
      right: 48px; bottom: 130px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      writing-mode: vertical-rl;
    }

    section { padding: 120px 60px; }

    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      max-width: 80px;
      height: 1px;
      background: var(--border2);
    }

    #about {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 100px;
      align-items: start;
      border-top: 1px solid var(--border);
    }
    .about-left h2 {
      font-family: var(--font-serif);
      font-size: clamp(36px, 4vw, 52px);
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: 32px;
    }
    .about-left h2 em { font-style: italic; color: var(--accent); }
    .about-left p {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.9;
      font-weight: 300;
      margin-bottom: 16px;
    }
    .about-right { padding-top: 60px; }
    .skills-group { margin-bottom: 40px; }
    .skills-group h4 {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 16px;
    }
    .skills-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 14px;
      transition: border-color 0.2s, color 0.2s;
    }
    .skill-tag:hover { border-color: var(--accent2); color: var(--text); }

    #work { border-top: 1px solid var(--border); background: var(--bg2); }
    .work-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; }

    .work-card {
      background: var(--bg3);
      padding: 48px;
      position: relative;
      overflow: hidden;
      cursor: none;
      text-decoration: none;
      display: block;
      transition: background 0.3s;
    }
    .work-card::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent-glow);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .work-card:hover::before { opacity: 1; }
    .work-card:hover { background: var(--surface); }

    .work-card-num {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent2);
      margin-bottom: 40px;
    }
    .work-card h3 {
      font-family: var(--font-sans);
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      transition: color 0.2s;
    }
    .work-card:hover h3 { color: var(--accent); }
    .work-card p {
      font-size: 15px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.8;
      margin-bottom: 32px;
    }
    .work-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
    .work-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--accent2);
      text-transform: uppercase;
    }
    .work-tag + .work-tag::before { content: '·'; margin-right: 8px; color: var(--border2); }
    .work-link {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: gap 0.2s;
    }
    .work-card:hover .work-link { gap: 14px; }
    .work-link::after { content: '→'; }

    .work-card-img {
      position: absolute;
      top: 0; right: 0;
      width: 180px; height: 180px;
      background: var(--surface);
      overflow: hidden;
      opacity: 0.4;
      transition: opacity 0.3s, transform 0.3s;
    }
    .work-card:hover .work-card-img { opacity: 0.7; transform: scale(1.03); }
    .img-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--border2);
      letter-spacing: 0.15em;
    }

    .work-card.featured {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 60px;
      align-items: center;
    }
    .work-card.featured .work-card-img {
      position: relative;
      width: 280px; height: 200px;
      opacity: 0.5;
    }

    #experience { border-top: 1px solid var(--border); }
    .exp-list { display: flex; flex-direction: column; }
    .exp-item {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 40px;
      padding: 40px 0;
      border-bottom: 1px solid var(--border);
    }
    .exp-item:first-child { border-top: 1px solid var(--border); }
    .exp-date {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding-top: 4px;
    }
    .exp-content h3 {
      font-family: var(--font-sans);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .exp-content .exp-company {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 12px;
      letter-spacing: 0.08em;
    }
    .exp-content p { font-size: 15px; color: var(--muted); font-weight: 300; line-height: 1.8; }

    #contact {
      border-top: 1px solid var(--border);
      background: var(--bg2);
      text-align: center;
      padding: 140px 60px;
    }
    #contact .big-text {
      font-family: var(--font-serif);
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 24px;
    }
    #contact .big-text em { font-style: italic; color: var(--accent); }
    #contact p {
      font-size: 16px;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 48px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .contact-email {
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent2);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .contact-email:hover { color: var(--text); border-color: var(--text); }
    .social-links { display: flex; justify-content: center; gap: 32px; margin-top: 60px; }
    .social-links a {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .social-links a:hover { color: var(--accent); }

    footer {
      padding: 32px 60px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) forwards; }
    .fade-up:nth-child(1) { animation-delay: 0.1s; }
    .fade-up:nth-child(2) { animation-delay: 0.25s; }
    .fade-up:nth-child(3) { animation-delay: 0.4s; }
    .fade-up:nth-child(4) { animation-delay: 0.55s; }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      #hero { padding: 0 24px 60px; }
      section { padding: 80px 24px; }
      #about { grid-template-columns: 1fr; gap: 48px; }
      .work-grid { grid-template-columns: 1fr; }
      .work-card.featured { grid-template-columns: 1fr; }
      .work-card.featured .work-card-img { width: 100%; height: 140px; }
      .exp-item { grid-template-columns: 1fr; gap: 8px; }
      footer { flex-direction: column; gap: 12px; text-align: center; }
      body { cursor: auto; }
      .cursor, .cursor-ring { display: none; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <nav id="nav">
    <a href="#hero" class="nav-logo" id="nav-initials"></a>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#work">Work</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section id="hero">
    <div class="hero-bg"></div>
    <div class="hero-eyebrow fade-up" id="hero-badge"></div>
    <h1 class="hero-name fade-up" id="hero-name"></h1>
    <p class="hero-desc fade-up" id="hero-desc"></p>
    <div class="hero-cta fade-up">
      <a href="#work" class="btn-primary">View Work</a>
      <a href="#contact" class="btn-ghost">Get in touch</a>
    </div>
    <div class="hero-scroll-line"></div>
    <div class="hero-counter">01 / INTRO</div>
  </section>

  <section id="about">
    <div class="about-left reveal">
      <div class="section-label">About me</div>
      <h2>I turn <em>ideas</em> into<br/>digital experiences</h2>
      <div id="about-bio"></div>
    </div>
    <div class="about-right reveal">
      <div id="skills-container"></div>
    </div>
  </section>

  <section id="work">
    <div class="section-label reveal">Selected work</div>
    <div class="work-grid" id="work-grid"></div>
  </section>

  <section id="experience">
    <div class="section-label reveal">Experience</div>
    <div class="exp-list" id="exp-list"></div>
  </section>

  <section id="contact">
    <div class="big-text reveal">
      Let's make<br/>something <em>great.</em>
    </div>
    <p class="reveal">Open to freelance projects, full-time roles, and interesting conversations.</p>
    <a id="contact-email" class="contact-email reveal" href="#"></a>
    <div class="social-links reveal" id="social-links"></div>
  </section>

  <footer>
    <p id="footer-copy"></p>
    <p>Designed &amp; built with intention.</p>
  </footer>

  <script>
    // ── Apply theme overrides ──────────────────────────────────
    if (PORTFOLIO.theme?.accent) {
      document.documentElement.style.setProperty('--accent', PORTFOLIO.theme.accent);
    }

    // ── Helpers ───────────────────────────────────────────────
    const $ = id => document.getElementById(id);

    // ── Populate page title ───────────────────────────────────
    document.title = `Portfolio — ${PORTFOLIO.name}`;

    // ── Nav ───────────────────────────────────────────────────
    $('nav-initials').textContent = PORTFOLIO.initials;

    // ── Hero ──────────────────────────────────────────────────
    $('hero-badge').textContent = PORTFOLIO.available ? 'Available for work' : `Based in ${PORTFOLIO.location}`;

    const heroName = $('hero-name');
    // Split name at last space for two-line display
    const nameParts = PORTFOLIO.name.trim().split(/\s+/);
    const lastName  = nameParts.pop();
    const firstName = nameParts.join(' ');
    heroName.innerHTML = firstName
      ? `${firstName}<br/>${lastName}<span>${PORTFOLIO.role}</span>`
      : `${lastName}<span>${PORTFOLIO.role}</span>`;

    $('hero-desc').textContent = `${PORTFOLIO.bio[0].split('.')[0]}.  Based in ${PORTFOLIO.location}, working worldwide.`;

    // ── About bio ─────────────────────────────────────────────
    const bioContainer = $('about-bio');
    PORTFOLIO.bio.forEach(para => {
      const p = document.createElement('p');
      p.textContent = para;
      bioContainer.appendChild(p);
    });

    // ── Skills ────────────────────────────────────────────────
    const skillsContainer = $('skills-container');
    Object.entries(PORTFOLIO.skills).forEach(([group, items]) => {
      const div = document.createElement('div');
      div.className = 'skills-group';
      div.innerHTML = `
        <h4>${group}</h4>
        <div class="skills-list">
          ${items.map(s => `<span class="skill-tag">${s}</span>`).join('')}
        </div>`;
      skillsContainer.appendChild(div);
    });

    // ── Projects ──────────────────────────────────────────────
    const workGrid = $('work-grid');
    let cardIndex  = 0;

    PORTFOLIO.projects.forEach(project => {
      cardIndex++;
      const numStr = String(cardIndex).padStart(2, '0');
      const label  = project.featured ? `${numStr} — Featured` : numStr;
      const tags   = project.tags.map(t => `<span class="work-tag">${t}</span>`).join('');

      const card = document.createElement('a');
      card.href      = project.url || '#';
      card.className = 'work-card reveal' + (project.featured ? ' featured' : '');

      if (project.featured) {
        card.innerHTML = `
          <div>
            <div class="work-card-num">${label}</div>
            <h3>${project.title}</h3>
            <p>${project.desc}</p>
            <div class="work-tags">${tags}</div>
            <span class="work-link">View project</span>
          </div>
          <div class="work-card-img"><div class="img-placeholder">PROJECT IMAGE</div></div>`;
      } else {
        card.innerHTML = `
          <div class="work-card-img"><div class="img-placeholder">IMAGE</div></div>
          <div class="work-card-num">${label}</div>
          <h3>${project.title}</h3>
          <p>${project.desc}</p>
          <div class="work-tags">${tags}</div>
          <span class="work-link">View project</span>`;
      }

      workGrid.appendChild(card);
    });

    // ── Experience ────────────────────────────────────────────
    const expList = $('exp-list');
    PORTFOLIO.experience.forEach(item => {
      const div = document.createElement('div');
      div.className = 'exp-item reveal';
      div.innerHTML = `
        <div class="exp-date">${item.period}</div>
        <div class="exp-content">
          <h3>${item.role}</h3>
          <div class="exp-company">${item.company}</div>
          <p>${item.desc}</p>
        </div>`;
      expList.appendChild(div);
    });

    // ── Contact ───────────────────────────────────────────────
    const emailEl = $('contact-email');
    emailEl.href        = `mailto:${PORTFOLIO.email}`;
    emailEl.textContent = PORTFOLIO.email;

    const socialLinks = $('social-links');
    Object.entries(PORTFOLIO.socials).forEach(([platform, url]) => {
      if (!url) return;
      const a = document.createElement('a');
      a.href        = url;
      a.textContent = platform.charAt(0).toUpperCase() + platform.slice(1);
      a.target      = '_blank';
      a.rel         = 'noopener noreferrer';
      socialLinks.appendChild(a);
    });

    // ── Footer ────────────────────────────────────────────────
    $('footer-copy').textContent = `© ${new Date().getFullYear()} ${PORTFOLIO.name}. All rights reserved.`;

    // ── Custom cursor ─────────────────────────────────────────
    const cursor = $('cursor');
    const ring   = $('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });
    (function animRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animRing);
    })();

    // ── Scroll nav ────────────────────────────────────────────
    const nav = $('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    });

    // ── Scroll reveal ─────────────────────────────────────────
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        const siblings = e.target.parentElement.querySelectorAll('.reveal');
        siblings.forEach((s, i) => {
          setTimeout(() => s.classList.add('visible'), i * 80);
        });
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

</body>
</html>
